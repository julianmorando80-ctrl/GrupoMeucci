<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Meucci - Informe Comercial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@500;700&family=Exo+2:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .site-header {
            background-color: #2a2a2a;
            padding: 28px 20px 24px;
            border-bottom: 2px solid rgba(200, 168, 75, 0.35);
            text-align: center;
        }

        .site-header img {
            height: 90px;
            object-fit: contain;
            display: block;
            margin: 0 auto 12px auto;
            background: transparent;
            border: none;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .site-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            letter-spacing: 0.08em;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 40px rgba(200, 168, 75, 0.25);
        }

        .site-header .subtitle {
            font-family: 'Exo 2', sans-serif;
            font-size: 16px;
            color: #aaaaaa;
            letter-spacing: 0.3em;
        }

        .site-header .breadcrumb {
            margin-top: 6px;
            font-size: 13px;
            color: #555555;
            letter-spacing: 0.04em;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            padding: 52px 24px;
        }

        .category-section {
            max-width: 1100px;
            margin: 0 auto 60px auto;
        }

        .category-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 42px;
            color: #ffffff;
            letter-spacing: 0.15em;
            margin-bottom: 18px;
            padding-left: 16px;
            border-left: 3px solid #c8a84b;
        }

        /* ── ROW ── */
        .concesionarias-row {
            background-color: #f0f0f0;
            border-radius: 16px;
            padding: 40px 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 16px;
            transition: box-shadow 0.25s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 4px 0 rgba(200, 168, 75, 0.45);
        }

        .concesionaria-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 140px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            transition: background-color 0.2s ease;
        }

        .concesionaria-card:hover {
            background-color: rgba(200, 168, 75, 0.08);
        }

        .concesionaria-card.active {
            background-color: rgba(200, 168, 75, 0.18);
        }

        .concesionaria-card img {
            height: 100px;
            width: 100%;
            max-width: 180px;
            object-fit: contain;
        }

        /* ── BRANDS PANEL ── */
        .brands-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            background-color: #141414;
            border-radius: 0 0 14px 14px;
        }

        .brands-panel.open {
            max-height: 200px;
            padding: 22px 32px 28px;
        }

        .brands-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .brand-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .brand-item {
            cursor: pointer;
        }

        .brand-item img {
            height: 60px;
            width: 120px;
            object-fit: contain;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            padding: 4px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .brand-item:hover img {
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(200, 168, 75, 0.25);
        }

        .brand-item span {
            font-size: 0.7rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="site-header" id="site-header">
        <img src="Logos/logo-meucci.png" alt="Grupo Meucci" style="height:90px; display:block; margin: 0 auto 12px auto;">
        <div class="header-text">
            <h1>Informe Comercial</h1>
            <div style="width:60px; height:2px; background:linear-gradient(90deg, transparent, #c8a84b, transparent); margin: 10px auto;"></div>
            <p class="subtitle">by JMorando</p>
        </div>
    </header>

    <div class="main-content">

        <!-- AUTOS -->
        <section class="category-section">
            <h2 class="category-title">Autos</h2>

            <div class="concesionarias-row">
                <div class="concesionaria-card" data-target="panel-meucci-autos">
                    <img src="Logos/meucci-automotores.png" alt="Meucci Automotores">
                </div>
                <div class="concesionaria-card" data-target="panel-dallas">
                    <img src="Logos/dallas.png" alt="Dallas">
                </div>
                <div class="concesionaria-card" data-target="panel-scuderia">
                    <img src="Logos/scuderia.png" alt="Scuderia">
                </div>
                <div class="concesionaria-card" data-target="panel-kia">
                    <img src="Logos/kia-del-norte-azul.png" alt="KIA Del Norte">
                </div>
                <div class="concesionaria-card" data-target="panel-alliance">
                    <img src="Logos/alliance.png" alt="Alliance" style="background-color:#b0b0b0; border-radius:8px; padding:6px;">
                </div>
            </div>

            <div class="brands-panel" id="panel-meucci-autos">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/jeep.png" alt="Jeep"><span>Jeep</span></div>
                    <div class="brand-item"><img src="Logos/ram.png" alt="RAM"><span>RAM</span></div>
                    <div class="brand-item"><img src="Logos/fiat.png" alt="Fiat"><span>Fiat</span></div>
                    <div class="brand-item"><img src="Logos/dfsk.png" alt="DFSK"><span>DFSK</span></div>
                    <div class="brand-item"><img src="Logos/shneray.png" alt="Shineray"><span>Shineray</span></div>
                    <div class="brand-item"><img src="Logos/jmc.png" alt="JMC"><span>JMC</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-dallas">
                <div class="brands-inner">
                    <div class="brand-item" onclick="location.href='jeep.html'" style="cursor:pointer;"><img src="Logos/jeep.png" alt="Jeep"><span>Jeep</span></div>
                    <div class="brand-item"><img src="Logos/ram.png" alt="RAM"><span>RAM</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-scuderia">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/fiat.png" alt="Fiat"><span>Fiat</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-kia">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/kia-del-norte-azul.png" alt="KIA"><span>KIA</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-alliance">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/alliance.png" alt="Alliance" style="background-color:#b0b0b0; border-radius:8px; padding:2px;"><span>Alliance</span></div>
                </div>
            </div>
        </section>

        <!-- MOTOS -->
        <section class="category-section">
            <h2 class="category-title">Motos</h2>

            <div class="concesionarias-row">
                <div class="concesionaria-card" data-target="panel-meucci-motos">
                    <img src="Logos/meucci-motos.png" alt="Meucci Motos">
                </div>
                <div class="concesionaria-card" data-target="panel-royal">
                    <img src="Logos/royal-enfield.png" alt="Royal Enfield Nordeste">
                </div>
                <div class="concesionaria-card" data-target="panel-benelli">
                    <img src="Logos/benellis.png" alt="Benelli Nordeste">
                </div>
                <div class="concesionaria-card" data-target="panel-keeway">
                    <img src="Logos/keeway.png" alt="Keeway">
                </div>
                <div class="concesionaria-card" data-target="panel-morbidelli">
                    <img src="Logos/morbidelli.png" alt="Morbidelli">
                </div>
            </div>

            <div class="brands-panel" id="panel-meucci-motos">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/benellis.png" alt="Benelli"><span>Benelli</span></div>
                    <div class="brand-item"><img src="Logos/motomel.png" alt="Motomel"><span>Motomel</span></div>
                    <div class="brand-item"><img src="Logos/suzuki.png" alt="Suzuki"><span>Suzuki</span></div>
                    <div class="brand-item"><img src="Logos/royal-enfield.png" alt="Royal Enfield"><span>Royal Enfield</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-royal">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/royal-enfield.png" alt="Royal Enfield"><span>Royal Enfield</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-benelli">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/benellis.png" alt="Benelli"><span>Benelli</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-keeway">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/keeway.png" alt="Keeway"><span>Keeway</span></div>
                </div>
            </div>
            <div class="brands-panel" id="panel-morbidelli">
                <div class="brands-inner">
                    <div class="brand-item"><img src="Logos/morbidelli.png" alt="Morbidelli"><span>Morbidelli</span></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ── Toggle de paneles individuales por card ──
        // Un panel abierto por sección a la vez
        const activeBySection = new Map();

        document.querySelectorAll('.concesionaria-card[data-target]').forEach(card => {
            card.style.cursor = 'pointer';
            card.addEventListener('click', () => {
                const targetId = card.getAttribute('data-target');
                const panel = document.getElementById(targetId);
                const section = card.closest('.category-section');
                const isAlreadyOpen = panel.classList.contains('open');

                // Cerrar el panel activo de esta sección si es distinto
                const prev = activeBySection.get(section);
                if (prev && prev.panel !== panel) {
                    prev.panel.classList.remove('open');
                    prev.card.classList.remove('active');
                }

                if (isAlreadyOpen) {
                    panel.classList.remove('open');
                    card.classList.remove('active');
                    activeBySection.delete(section);
                } else {
                    panel.classList.add('open');
                    card.classList.add('active');
                    activeBySection.set(section, { panel, card });
                }
            });
        });
    </script>

    <footer style="background-color:#111111; border-top:1px solid #2a2a2a; padding:20px; text-align:center; margin-top:40px;">
        <p style="font-family:'Exo 2',sans-serif; font-size:12px; color:#444; letter-spacing:0.15em;">
            © 2026 GRUPO MEUCCI &nbsp;·&nbsp; INFORME COMERCIAL &nbsp;·&nbsp; by JMorando
        </p>
    </footer>

</body>
</html>
